openapi: 3.0.3
info:
  title: InfoClimat v1 API
  version: 0.1.0
  description: |
    API pour accéder aux données climatologiques comparatives en France métropolitaine.

    Cette API permet d'analyser et comparer les données de température dans le temps et l'espace,
    principalement destinée aux équipes de chaînes TV préparant des bulletins météo.

    ## Fonctionnalités principales
    - Écart de température à la normale (baseline 1991-2020)
    - Analyse des pics de chaleur/froid
    - Records de température
    - Indicateur thermique national
    - Comparaisons min/max
    - Galerie photos communautaire

  contact:
    name: DataForGood
    url: https://dataforgood.fr
  license:
    name: À définir

tags:
  - name: Temperature
    description: Endpoints liés aux données de température (incluant écarts, pics, records, indicateurs)
  - name: Photos
    description: Mur photos communautaire
  - name: Stations
    description: Métadonnées des stations météorologiques

paths:
  /temperature/deviation:
    get:
      summary: Vue synthétique des écarts de température à la normale
      description: >
        Retourne les données agrégées nécessaires à l'écran de synthèse des écarts
        de température à la normale sur une période donnée :
        un indicateur national moyen et une liste paginée de stations agrégées
        sur la période.

        Le tableau des stations peut être filtré par recherche textuelle, critères
          numériques, zone géographique ou liste explicite d'identifiants de stations.

        L'indicateur national est calculé à l'échelle de la France métropolitaine
        et n'est pas affecté par les filtres appliqués au tableau des stations.
      operationId: getTemperatureDeviationOverview
      tags:
        - Temperature
      parameters:
        - name: date_start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de début incluse (YYYY-MM-DD).
          example: "2025-03-01"

        - name: date_end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de fin incluse (YYYY-MM-DD).
          example: "2025-03-31"

        - name: station_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
          description: >
            Liste d'identifiants de stations à inclure dans la réponse.
            Permet de restreindre explicitement le tableau à une sélection de stations.
          example: "07149,07255"

        - name: station_search
          in: query
          required: false
          schema:
            type: string
          description: Filtre textuel sur le nom de station.
          example: "Montsouris"

        - name: temperature_mean_min
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Température moyenne minimale incluse.
          example: 20.0

        - name: temperature_mean_max
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Température moyenne maximale incluse.
          example: 35.0

        - name: deviation_min
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Écart à la normale minimal inclus.
          example: -2.0

        - name: deviation_max
          in: query
          required: false
          schema:
            type: number
            format: float
          description: Écart à la normale maximal inclus.
          example: 4.0

        - name: ordering
          in: query
          required: false
          schema:
            type: string
            enum:
              - station_name
              - -station_name
              - temperature_mean
              - -temperature_mean
              - deviation
              - -deviation
              - department
              - -department
              - region
              - -region
            default: -deviation
          description: >
            Champ de tri du tableau. Le préfixe '-' indique un tri décroissant.

        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Nombre maximal d'éléments retournés.

        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Nombre d'éléments à ignorer avant de commencer la page.

        - name: alt_min
          in: query
          schema:
            type: number
          required: false

        - name: alt_max
          in: query
          schema:
            type: number
          required: false

        - name: departments
          in: query
          schema:
            type: string
          description: |
            Liste de départements séparés par des virgules (ex: "13,75,2A")

        - name: regions
          in: query
          schema:
            type: string
          description: |
            Liste de régions séparées par des virgules (ex: "Île-de-France,Provence-Alpes-Côte d'Azur")

      responses:
        "200":
          description: Indicateur national et tableau paginé des stations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureDeviationOverviewResponse"
              examples:
                sample:
                  summary: Réponse paginée sur une période donnée
                  value:
                    metadata:
                      date_start: "2025-03-01"
                      date_end: "2025-03-31"
                      baseline: "1991-2020"
                      filters:
                        station_search: null
                        station_ids: ["07149", "07255"]
                        temperature_mean_min: null
                        temperature_mean_max: null
                        deviation_min: null
                        deviation_max: null
                      ordering: "-deviation"
                    national:
                      deviation_mean: 2.1
                    pagination:
                      total_count: 1320
                      limit: 50
                      offset: 0
                    stations:
                      - station_id: "013001650"
                        station_name: "Marseille-Marignane"
                        temperature_mean: 28.5
                        baseline_mean: 25.2
                        deviation: 3.3
                        alt: 10
                        lat: 44
                        lon: 5.3
                        department: "13"
                        region: "Provence-Alpes-Côte d'Azur"
                      - station_id: "7501111156"
                        station_name: "Paris-Montsouris"
                        temperature_mean: 28.5
                        baseline_mean: 26.5
                        deviation: 2.0
                        lat: 46
                        lon: 2
                        alt: 40
                        department: "75"
                        region: "Ile de France"
        "400":
          $ref: "#/components/responses/BadRequest"

  /temperature/deviation/graph:
    get:
      summary: Données d'écart de température à la normale pour les graphes
      description: >
        Récupère les données d'écart de température par rapport à la normale (baseline fixe 1991-2020).
        Permet de comparer l'écart à la normale moyen en France avec celui de stations spécifiques.
        La granularité temporelle est ajustable (jour, mois, année) pour s'adapter à l'axe des abscisses.
      operationId: getTemperatureDeviationGraph
      tags:
        - Temperature
      parameters:
        - name: date_start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de début incluse (YYYY-MM-DD).
          example: "2025-02-01"

        - name: date_end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de fin incluse (YYYY-MM-DD).
          example: "2026-01-31"

        - name: granularity
          in: query
          required: true
          schema:
            type: string
            enum: [year, month, day]
          description: >
            Unité de l'axe des abscisses.
            - year : agrégation par année
            - month : agrégation par mois
            - day : agrégation par jour
          example: month

        - name: station_ids
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
          description: >
            Liste d'identifiants de stations spécifiques à inclure pour superposer les graphes.
            Si ce paramètre est absent ou vide, et que 'include_national' vaut 'false', l'API retourne une erreur 400.
          example: "07149,07255"

        - name: include_national
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: >
            Indique si la série nationale doit être incluse dans la réponse.
            Si ce paramètre vaut 'true', la propriété `national` est présente dans la réponse.
            Si ce paramètre est défini à 'false', et que 'station_ids' est absent ou vide, l'API retourne une erreur 400.

      responses:
        "200":
          description: Séries temporelles de l'écart à la normale pour la moyenne nationale (optionnelle) et les stations demandées.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemperatureDeviationGraphResponse"
              examples:
                national_and_stations:
                  summary: Moyenne nationale et deux stations (granularité journalière)
                  value:
                    metadata:
                      date_start: "2025-02-01"
                      date_end: "2025-02-02"
                      baseline: "1991-2020"
                      granularity: "day"
                    national:
                      data:
                        - date: "2025-02-01"
                          deviation: 1.2
                          temperature: 8.4
                          baseline_mean: 7.2
                        - date: "2025-02-02"
                          deviation: 0.5
                          temperature: 7.8
                          baseline_mean: 7.3
                    stations:
                      - station_id: "07149"
                        station_name: "Orly"
                        data:
                          - date: "2025-02-01"
                            deviation: 0.8
                            temperature: 7.9
                            baseline_mean: 7.1
                          - date: "2025-02-02"
                            deviation: 0.2
                            temperature: 7.5
                            baseline_mean: 7.3
                      - station_id: "07255"
                        station_name: "Marseille-Marignane"
                        data:
                          - date: "2025-02-01"
                            deviation: 1.5
                            temperature: 10.3
                            baseline_mean: 8.8
                          - date: "2025-02-02"
                            deviation: 0.9
                            temperature: 9.6
                            baseline_mean: 8.7
                stations_only:
                  summary: Stations uniquement
                  value:
                    metadata:
                      date_start: "2025-02-01"
                      date_end: "2025-02-28"
                      baseline: "1991-2020"
                      granularity: "day"
                    stations:
                      - station_id: "07149"
                        station_name: "Orly"
                        data:
                          - date: "2025-02-01"
                            deviation: 0.8
                            temperature: 7.9
                            baseline_mean: 7.1
        "400":
          $ref: "#/components/responses/BadRequest"

  /temperature/extremes:
    get:
      summary: Pics de chaleur et de froid
      description: |
        Identifie et compte les jours de pics de chaleur/froid par rapport à la normale.

        **Documentation des paramètres et schémas à compléter**
      operationId: getTemperatureExtremes
      tags:
        - Temperature
      parameters: []
      responses:
        "200":
          description: Succès
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"

  /temperature/records:
    get:
      summary: Records de température
      description: |
        Liste les records de température par station.

        L'endpoint permet de filtrer :
        - le découpage temporel (`period_type`) : tous les temps, par mois ou par saison

        - le type de record (`hot` ou `cold`)

        Exemples de requêtes :

        - `period_type=all_time&type_records=hot`

        - `period_type=month&month=7&type_records=hot`

        - `period_type=season&season=summer&type_records=cold`

      operationId: getTemperatureRecords
      tags:
        - Temperature
      parameters:
        - name: period_type
          in: query
          required: false
          description: |
            Découpage temporel des records :
            - `all_time` : records sans découpage temporel (défaut)
            - `month` : records pour un mois donné (paramètre `month` requis)
            - `season` : records pour une saison donnée (paramètre `season` requis)
          schema:
            type: string
            enum: [all_time, month, season]
            default: all_time
        - name: month
          in: query
          required: false
          description: |
            Numéro du mois (1-12). Requis si `period_type=month`.
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 7
        - name: season
          in: query
          required: false
          description: |
            Saison. Requis si `period_type=season`.
            - `spring` : printemps (mars–mai)
            - `summer` : été (juin–août)
            - `autumn` : automne (septembre–novembre)
            - `winter` : hiver (décembre–février)
          schema:
            type: string
            enum: [spring, summer, autumn, winter]
        - name: type_records
          in: query
          required: false
          description: |
            Type de records à retourner :
            - `hot` : records chauds (défaut)
            - `cold` : records froids
          schema:
            type: string
            enum: [hot, cold]
            default: hot
      responses:
        "200":
          description: Liste des records de température par station.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TemperatureRecordEntry"
              examples:
                sample:
                  summary: Exemple de réponse
                  value:
                    - station_id: "07149"
                      station_name: "Orly"
                      department: "94"
                      record_value: 40.4
                      record_date: "2019-07-25"
                      lat: 48.718
                      lon: 2.397
                      alt: 86.0
                    - station_id: "07156"
                      station_name: "Paris-Montsouris"
                      department: "75"
                      record_value: 39.7
                      record_date: "2019-07-25"
                      lat: 48.821667
                      lon: 2.337833
                      alt: 75.0

        "400":
          $ref: "#/components/responses/BadRequest"

  /temperature/records/cumulative:
    get:
      summary: Cumul des records
      description: |
        Évolution cumulative du nombre de records chauds et froids sur une année.

        **Documentation des paramètres et schémas à compléter**
      operationId: getCumulativeRecords
      tags:
        - Temperature
      parameters: []
      responses:
        "200":
          description: Succès
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"

  /temperature/national-indicator:
    get:
      tags:
        - Temperature
      summary: Indicateur thermique national (ITN) agrégé
      description: >
        Retourne une série temporelle de l’indicateur thermique national (ITN).
        La granularité de l'axe X est contrôlée par `granularity`.
        Un filtre intra-période optionnel est contrôlé par `slice_type` et paramètres associés.

        Combinaisons valides (validation côté API) :

        - granularity=year :
          - slice_type=full (défaut) : agrégat sur l'année complète
          - slice_type=month_of_year : agrégat sur un mois donné (month_of_year requis)
          - slice_type=day_of_month : échantillon sur un jour précis de l'année (month_of_year + day_of_month requis)
        - granularity=month :
          - slice_type=full (défaut) : agrégat sur le mois complet
          - slice_type=day_of_month : échantillon sur le N-ième jour de chaque mois (day_of_month requis)
        - granularity=day :
          - slice_type=full uniquement (slice_type doit être absent ou full)

        Règle "jours inexistants" :
        - si day_of_month n'existe pas dans un mois (ex: 30/02, 31/04), le dernier jour du mois est utilisé.
      operationId: getNationalIndicator
      parameters:
        - name: date_start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de début incluse (YYYY-MM-DD).
          example: "1990-01-01"

        - name: date_end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de fin incluse (YYYY-MM-DD).
          example: "2024-12-31"

        - name: granularity
          in: query
          required: true
          schema:
            type: string
            enum: [year, month, day]
          description: >
            Granularité de la série temporelle.
            - year : un point par année
            - month : un point par mois
            - day : un point par jour
          example: month

        - name: slice_type
          in: query
          required: false
          schema:
            type: string
            enum: [full, month_of_year, day_of_month]
            default: full
          description: >
            Filtre intra-période appliqué à chaque période (selon `granularity`).
            - full : agrégat sur toute la période (défaut)
            - month_of_year : agrégat sur un mois spécifique de l’année (month_of_year requis, granularity=year)
            - day_of_month : échantillon sur un jour du mois (day_of_month requis, et si granularity=year alors month_of_year requis)

        - name: month_of_year
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: >
            Mois concerné (1..12).
            Requis si slice_type=month_of_year.
            Requis aussi si slice_type=day_of_month ET granularity=year (pour exprimer un jour précis de l’année).
          example: 1

        - name: day_of_month
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 31
          description: >
            Jour du mois concerné (1..31).
            Requis si slice_type=day_of_month.
            Si le jour n'existe pas dans un mois, le dernier jour du mois est utilisé.
          example: 29

      responses:
        "200":
          description: Série temporelle de l'indicateur thermique national.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NationalIndicatorResponse"
        "400":
          description: Paramètre invalide ou manquant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /temperature/national-indicator-kpi:
    get:
      tags:
        - Temperature
      summary: Pic de chaud/froid à partir de l'indicateur thermique national (ITN)
      description: >
        Retourne une liste de jours de pic (chaud ou froid) ainsi que le nombre de pics (i.e jours) sur la période
        Un pic de chaud correspond à une journée ou la température de l'itn >= mean_baseline + std_baseline
      operationId: getNationalIndicator
      parameters:
        - name: date_start
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de début incluse (YYYY-MM-DD).
          example: "1990-01-01"

        - name: date_end
          in: query
          required: true
          schema:
            type: string
            format: date
          description: Date de fin incluse (YYYY-MM-DD).
          example: "2024-12-31"
        - name: type_records
          in: query
          required: true
          description: |
            Type de pics à retourner :
            - `hot` : pic de chauds (défaut)
            - `cold` : records froids
          schema:
            type: string
            enum: [hot, cold]
          example: "hot"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NationalIndicatorResponse"
        "400":
          description: Paramètre invalide ou manquant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /photos:
    get:
      summary: Liste des photos
      description: |
        Galerie photos partagées par la communauté.

        **Documentation des paramètres et schémas à compléter**
      operationId: getPhotos
      tags:
        - Photos
      parameters: []
      responses:
        "200":
          description: Succès
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"

  /stations:
    get:
      summary: Liste des stations météorologiques
      description: |
        Métadonnées des stations avec filtres sur classe, département,
        année de création et disponibilité des données.
      operationId: getStations
      tags:
        - Stations
      parameters:
        - name: station_class
          in: query
          description: Classes de stations (1=meilleure qualité, 5=moins fiable)
          schema:
            type: array
            items:
              type: integer
              minimum: 1
              maximum: 5
          style: form
          explode: false
        - name: min_creation_year
          in: query
          description: Année de création minimum
          schema:
            type: integer
            minimum: 1800
            example: 2000
        - name: department
          in: query
          description: Numéro de département
          schema:
            type: string
            pattern: '^\d{2,3}$'
        - name: search
          in: query
          description: Recherche par nom de station
          schema:
            type: string
            example: "Orly"
        - name: has_data_for_period
          in: query
          description: Filtre les stations ayant des données sur la période (format JSON)
          schema:
            type: string
            example: '{"start":"2024-01-01","end":"2024-12-31"}'
      responses:
        "200":
          description: Succès
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationsResponse"
              examples:
                paris_area:
                  summary: Stations région parisienne
                  value:
                    stations:
                      - id: "07149"
                        name: "Orly"
                        department: "91"
                        class: 1
                        creation_year: 1948
                        coordinates:
                          lat: 48.7262
                          lon: 2.3650
                        altitude: 89
                        data_availability:
                          start_date: "1948-01-01"
                          end_date: "2024-12-31"
                          completeness: 0.98
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  schemas:
    Coordinates:
      type: object
      required:
        - lat
        - lon
      properties:
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
        lon:
          type: number
          format: double
          minimum: -180
          maximum: 180

    NationalIndicatorResponse:
      type: object
      required:
        - metadata
        - time_series
      properties:
        metadata:
          type: object
          required:
            - date_start
            - date_end
            - baseline
            - granularity
            - slice_type
          properties:
            date_start:
              type: string
              format: date
            date_end:
              type: string
              format: date
            baseline:
              type: string
              description: "Période de référence (ex: 1991-2020)."
              example: "1991-2020"
            granularity:
              type: string
              enum: [year, month, day]
              description: "Granularité de la série (axe X)."
              example: month
            slice_type:
              type: string
              enum: [full, month_of_year, day_of_month]
              description: "Filtre intra-période appliqué à chaque période."
              example: full
            month_of_year:
              type: integer
              minimum: 1
              maximum: 12
              description: "Mois concerné si slice_type=month_of_year, ou si slice_type=day_of_month & granularity=year."
            day_of_month:
              type: integer
              minimum: 1
              maximum: 31
              description: >
                Jour du mois concerné si slice_type=day_of_month.
                Si le jour n'existe pas dans un mois, le dernier jour du mois est utilisé.

        time_series:
          type: array
          description: "Série temporelle selon la granularité choisie"
          items:
            type: object
            required:
              - date
              - temperature
              - baseline_mean
              - baseline_std_dev_upper
              - baseline_std_dev_lower
              - baseline_max
              - baseline_min
            properties:
              date:
                type: string
                format: date
                description: |
                  Date du point de données.
                  - granularity=year: premier jour de l'année (ex: "2024-01-01")
                  - granularity=month: premier jour du mois (ex: "2024-02-01")
                  - granularity=day: date exacte du jour (ex: "2024-02-15")
              temperature:
                type: number
                format: float
                description: "Température observée (moyenne/valeur selon slice_type)"
              baseline_mean:
                type: number
                format: float
                description: "Température moyenne de référence 1991-2020 pour cette période"
              baseline_std_dev_upper:
                type: number
                format: float
                description: "Écart-type supérieur (moyenne + 1 écart-type)"
              baseline_std_dev_lower:
                type: number
                format: float
                description: "Écart-type inférieur (moyenne - 1 écart-type)"
              baseline_max:
                type: number
                format: float
                description: "Température maximale observée sur la période 1991-2020"
              baseline_min:
                type: number
                format: float
                description: "Température minimale observée sur la période 1991-2020"

    NationalIndicatorKpiResponse:
      type: object
      required:
        - count
        - days
      properties:
        count:
          type: integer
          description: "Nombre de jours de pic"
        days:
          type: array
          description: "Liste des jours de pic"
          items:
            type: object
            required:
              - date
              - temperature
              - baseline_mean
              - baseline_std_dev
            properties:
              date:
                type: string
                format: date
              temperature:
                type: number
                format: float
                description: "Température ITN du jour"
              baseline_mean:
                type: number
                format: float
                description: "Température moyenne de référence 1991-2020"
              baseline_std_dev:
                type: number
                format: float
                description: "Écart-type (baseline_std_dev_upper - baseline_mean)"

    StationsResponse:
      type: object
      required:
        - stations
      properties:
        stations:
          type: array
          items:
            type: object
            required:
              - id
              - name
              - department
              - class
              - creation_year
              - coordinates
              - altitude
            properties:
              id:
                type: string
                description: Identifiant unique de la station (ex "07149")
              name:
                type: string
              department:
                type: string
              class:
                type: integer
                minimum: 1
                maximum: 5
                description: Classe de qualité (1=meilleur, 5=moins fiable)
              creation_year:
                type: integer
              coordinates:
                $ref: "#/components/schemas/Coordinates"
              altitude:
                type: number
                format: float
                description: Altitude en mètres
              data_availability:
                type: object
                properties:
                  start_date:
                    type: string
                    format: date
                  end_date:
                    type: string
                    format: date
                  completeness:
                    type: number
                    format: float
                    minimum: 0
                    maximum: 1
                    description: Pourcentage de données disponibles

    TemperatureDeviationGraphPoint:
      type: object
      required:
        - date
        - deviation
        - temperature
        - baseline_mean
      properties:
        date:
          type: string
          format: date
        deviation:
          type: number
          format: float
          description: "Écart de température par rapport à la normale (temperature - baseline_mean)"
        temperature:
          type: number
          format: float
          description: "Température moyenne observée sur la période"
        baseline_mean:
          type: number
          format: float
          description: "Température moyenne de référence 1991-2020 pour cette période"

    NationalTemperatureDeviationSeries:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          description: "Série agrégée au niveau national"
          items:
            $ref: "#/components/schemas/TemperatureDeviationGraphPoint"

    StationTemperatureDeviationSeries:
      type: object
      required:
        - station_id
        - station_name
        - data
      properties:
        station_id:
          type: string
          description: "Identifiant de la station"
        station_name:
          type: string
          description: "Nom de la station (utile pour la légende du graphe)"
        data:
          type: array
          description: "Série agrégée pour cette station"
          items:
            $ref: "#/components/schemas/TemperatureDeviationGraphPoint"

    TemperatureDeviationGraphResponse:
      type: object
      required:
        - metadata
        - stations
      properties:
        metadata:
          type: object
          required:
            - date_start
            - date_end
            - baseline
            - granularity
          properties:
            date_start:
              type: string
              format: date
            date_end:
              type: string
              format: date
            baseline:
              type: string
              description: "Période de référence fixe imposée par les règles métier."
              example: "1991-2020"
            granularity:
              type: string
              enum: [year, month, day]
              description: "Granularité de la série (axe X)."
        national:
          $ref: "#/components/schemas/NationalTemperatureDeviationSeries"
        stations:
          type: array
          description: "Liste des séries correspondant aux stations demandées"
          items:
            $ref: "#/components/schemas/StationTemperatureDeviationSeries"
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - INVALID_PERIOD
                - INVALID_PARAMETER
                - MISSING_PARAMETER
                - STATION_NOT_FOUND
                - NO_DATA_AVAILABLE
                - RATE_LIMIT_EXCEEDED
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    TemperatureRecordEntry:
      type: object
      required:
        - station_id
        - station_name
        - department
        - record_value
        - record_date
        - lat
        - lon
        - alt
      properties:
        station_id:
          type: string
          description: Identifiant unique de la station (ex. "07149")
        station_name:
          type: string
          description: Nom de la station
        department:
          type: string
          description: Code du département de la station
        record_value:
          type: number
          description: Valeur de la température pour ce record (°C)
        record_date:
          type: string
          format: date
          description: Date à laquelle le record a été enregistré
        lat:
          type: number
          format: double
          description: Latitude de la station (degrés décimaux)
        lon:
          type: number
          format: double
          description: Longitude de la station (degrés décimaux)
        alt:
          type: number
          format: double
          description: Altitude de la station (mètres)
    TemperatureDeviationOverviewResponse:
      type: object
      required:
        - metadata
        - national
        - pagination
        - stations
      properties:
        metadata:
          $ref: "#/components/schemas/TemperatureDeviationOverviewMetadata"
        national:
          $ref: "#/components/schemas/TemperatureDeviationOverviewNational"
        pagination:
          $ref: "#/components/schemas/PaginationMetadata"
        stations:
          type: array
          items:
            $ref: "#/components/schemas/TemperatureDeviationOverviewStation"

    TemperatureDeviationOverviewMetadata:
      type: object
      required:
        - date_start
        - date_end
        - baseline
        - filters
        - ordering
      properties:
        date_start:
          type: string
          format: date
        date_end:
          type: string
          format: date
        baseline:
          type: string
          description: Période de référence fixe imposée par les règles métier.
          example: "1991-2020"
        filters:
          type: object
          properties:
            station_ids:
              type: array
              items:
                type: string
            station_search:
              type: string
              nullable: true
            temperature_mean_min:
              type: number
              nullable: true
            temperature_mean_max:
              type: number
              nullable: true
            deviation_min:
              type: number
              nullable: true
            deviation_max:
              type: number
              nullable: true
            alt_min:
              type: number
              nullable: true
            alt_max:
              type: number
              nullable: true
            departments:
              type: array
              items:
                type: string
            regions:
              type: array
              items:
                type: string
        ordering:
          type: string

    TemperatureDeviationOverviewNational:
      type: object
      required:
        - deviation_mean
      properties:
        deviation_mean:
          type: number
          format: float
          description: Écart moyen à la normale sur la période en France métropolitaine.

    PaginationMetadata:
      type: object
      required:
        - total_count
        - limit
        - offset
      properties:
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TemperatureDeviationOverviewStation:
      type: object
      required:
        - station_id
        - station_name
        - temperature_mean
        - baseline_mean
        - deviation
        - lat
        - lon
        - alt
        - department
        - region
      properties:
        station_id:
          type: string
        station_name:
          type: string
        temperature_mean:
          type: number
          format: float
        baseline_mean:
          type: number
          format: float
        deviation:
          type: number
          format: float
        lat:
          type: number
          format: double
          nullable: true
        lon:
          type: number
          format: double
          nullable: true
        alt:
          type: number
          format: double
          nullable: true
        department:
          type: string
          nullable: true
        region:
          type: string
          nullable: true

  responses:
    BadRequest:
      description: Paramètres de requête invalides
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            invalid_parameter:
              summary: Paramètre invalide
              value:
                error:
                  code: "INVALID_PARAMETER"
                  message: "Paramètre invalide ou manquant"
                  details:
                    parameter: "years"
